server:
  port: 8080

spring:
  application:
    name: dsr-portal

  # ── Database ─────────────────────────────────────────────────
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dsr_db?stringtype=unspecified}
    username: ${SPRING_DATASOURCE_USERNAME:dsr_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_strong_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  # ── JPA ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  # ── Flyway ───────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ── Redis ────────────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms

  # ── Cache ────────────────────────────────────────────────────
  cache:
    type: redis

  # ── Mail ─────────────────────────────────────────────────────
  mail:
    host:     ${MAIL_HOST:smtp.gmail.com}
    port:     ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── File upload limits ───────────────────────────────────────
  servlet:
    multipart:
      max-file-size:    10MB
      max-request-size: 12MB

# ── JWT ──────────────────────────────────────────────────────
jwt:
  secret:    ${JWT_SECRET:change-this-secret-to-something-very-long-and-random-32chars!}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}

# ── AI Service ───────────────────────────────────────────────
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:5000}

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

# ── Actuator (Docker healthcheck) ───────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
