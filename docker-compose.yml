version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: dsr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dsr_db
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d dsr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dsr-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsr-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/dsr_db?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST:          redis
      SPRING_REDIS_PORT:          6379
      JWT_SECRET:                 ${JWT_SECRET}
      JWT_EXPIRY_MS:              ${JWT_EXPIRY_MS:-86400000}
      MAIL_HOST:                  ${MAIL_HOST}
      MAIL_PORT:                  ${MAIL_PORT:-587}
      MAIL_USERNAME:              ${MAIL_USERNAME}
      MAIL_PASSWORD:              ${MAIL_PASSWORD}
      AI_SERVICE_URL:             http://ai-service:5000
      SPRING_PROFILES_ACTIVE:     docker
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Flask AI Service ──────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: dsr-ai
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      FLASK_ENV:    production
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React Frontend (Nginx) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api/v1
    container_name: dsr-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:

networks:
  default:
    name: dsr-network
